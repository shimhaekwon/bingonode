<!DOCTYPE html>
<html>
<head>
  <title>Developer Calculator</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2665fd;
      --secondary: #475569;
      --surface: #0b1326;
      --on-surface: #dae2fd;
      --surface-variant: #1a2333;
      --error: #ffb4ab;
      --border: rgba(218, 226, 253, 0.1);
    }

    body {
      background-color: var(--surface);
      color: var(--on-surface);
      font-family: 'Inter', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background-color: var(--surface-variant);
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 24px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--on-surface);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 8px;
      display: block;
    }

    .toolbar {
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input, select {
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--on-surface);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
    }

    select {
      width: auto;
      cursor: pointer;
    }

    button {
      font-family: inherit;
      font-weight: 500;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    #btnRandom {
      background-color: var(--secondary);
      color: white;
      width: 100%;
    }

    button[type="submit"] {
      background-color: var(--primary);
      color: white;
      margin-top: 8px;
    }

    .result-container {
      margin-top: 24px;
      padding: 16px;
      background-color: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .result-label {
      font-size: 12px;
      color: var(--secondary);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #result {
      font-size: 24px;
      font-weight: 600;
      color: var(--primary);
      display: block;
      min-height: 36px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calculator</h1>

    <div class="toolbar">
      <span class="label">Quick Actions</span>
      <button id="btnRandom" type="button">Get Random Values</button>
    </div>

    <form id="calcForm">
      <span class="label">Operation</span>
      <div class="input-group">
        <input id="inputNum1" type="number" name="num1" placeholder="Value 1" required>
        <select name="op">
          <option value="+">+</option>
          <option value="-">-</option>
          <option value="*">×</option>
          <option value="/">÷</option>
        </select>
        <input id="inputNum2" type="number" name="num2" placeholder="Value 2" required>
      </div>
      <button type="submit">Execute Calculation</button>
    </form>

    <div class="result-container">
      <div class="result-label">Result</div>
      <span id="result"></span>
    </div>
  </div>

  <script>
    // 계산 수행
    document.getElementById('calcForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        num1: formData.get('num1'),
        num2: formData.get('num2'),
        op: formData.get('op')
      };
      const res = await fetch('/api/calc/calc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      document.getElementById('result').textContent = json.result;
    });

    // 랜덤 값 받기
    document.getElementById('btnRandom').addEventListener('click', async () => {
      try {
        // 기본: 0~100 정수
        const res = await fetch('/api/calc/random', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          //body: JSON.stringify(data)
        });
        const { num1, num2 } = await res.json();
        document.getElementById('inputNum1').value = num1;
        document.getElementById('inputNum2').value = num2;
      } catch (err) {
        alert('랜덤 값을 가져오지 못했습니다.');
        LOG.err(err);
      }
    });

    // (옵션) 로또 스타일 1~45 정수
    // document.getElementById('btnRandomLotto').addEventListener('click', async () => {
    //   const res = await fetch('/myapi/calc/random?min=1&max=45');
    //   const { num1, num2 } = await res.json();
    //   document.getElementById('inputNum1').value = num1;
    //   document.getElementById('inputNum2').value = num2;
    // });
  </script>
</body>
</html>
``
